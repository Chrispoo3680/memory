<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory – Online Multiplayer</title>
    <link rel="stylesheet" href="online-style.css" />
  </head>
  <body>
    <!-- ── LOBBY ── -->
    <div id="lobby">
      <h1>Memory <span>Multiplayer</span></h1>

      <div class="card">
        <label for="player-name">Your name</label>
        <input
          id="player-name"
          type="text"
          placeholder="Enter your name"
          maxlength="20"
        />
      </div>

      <!-- Create section -->
      <div class="card" id="create-section">
        <h2>Create a game</h2>

        <div class="size-row">
          <div class="field">
            <label for="board-width">Columns</label>
            <select id="board-width">
              <option value="2">2</option>
              <option value="4" selected>4</option>
              <option value="6">6</option>
            </select>
          </div>
          <div class="field">
            <label for="board-height">Rows</label>
            <select id="board-height">
              <option value="2">2</option>
              <option value="4" selected>4</option>
              <option value="6">6</option>
            </select>
          </div>
        </div>

        <button id="create-btn">Create Game</button>

        <div id="game-code-display" class="hidden">
          <p>Share this code with your opponent:</p>
          <span id="game-code"></span>
          <p class="waiting">Waiting for opponent to join…</p>
        </div>
      </div>

      <!-- Join section -->
      <div class="card" id="join-section">
        <h2>Join a game</h2>
        <input
          id="join-code"
          type="text"
          placeholder="Enter game code"
          maxlength="8"
        />
        <button id="join-btn">Join Game</button>
      </div>

      <p id="lobby-error" class="error hidden"></p>
    </div>

    <!-- ── GAME ── -->
    <div id="game-screen" class="hidden">
      <header>
        <button id="leave-btn">← Leave</button>
        <div id="status-bar">
          <span id="status-text">Connecting…</span>
        </div>
        <div id="scoreboard">
          <span id="score-p1">–</span>
          <span class="divider">vs</span>
          <span id="score-p2">–</span>
        </div>
      </header>

      <div id="memory-container"></div>

      <div id="result-overlay" class="hidden">
        <div class="result-box">
          <h2 id="result-title"></h2>
          <p id="result-sub"></p>
          <button id="play-again-btn">Play Again</button>
        </div>
      </div>
    </div>

    <script type="module" src="scripts/online-game.js"></script>
  </body>
</html>
